# Air configuration for hot reload with Templ

root = "."
tmp_dir = "tmp"

[build]
  # Command to run before build (generate Templ templates)
  pre_cmd = ["templ generate"]
  
  # Build command
  cmd = "go build -o ./bin/web ."
  
  # Binary to run
  bin = "./bin/web"
  
  # Watch these file extensions
  include_ext = ["go", "templ"]
  
  # Ignore these directories
  exclude_dir = ["bin", "vendor", "tmp"]
  
  # Watch these directories
  include_dir = [".", "internal", "views"]
  
  # Exclude test files and generated files
  exclude_regex = ["_test.go", "_templ.go"]
  
  # Exclude specific files (generated by Templ)
  exclude_file = []
  
  # Exclude unchanged files
  exclude_unchanged = true
  
  # Delay after file change before rebuild (ms)
  delay = 1000
  
  # Stop on error
  stop_on_error = true
  
  # Log file for build errors
  log = "build-errors.log"
  
[log]
  # Show time in logs
  time = true
  
  # Show only main log
  main_only = false
  
[color]
  # Customize colors
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[screen]
  # Clear screen on restart
  clear_on_rebuild = true
  
  # Keep scroll position
  keep_scroll = true